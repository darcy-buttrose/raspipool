dose_acid:
  sequence:
    - service: atlas_scientific.dose_by_volume
      data:
        entity_id: switch.acid_pump
        volume: "{{ states('input_number.acid_dosing_amount') }}"
dose_chlorine:
  sequence:
    - service: atlas_scientific.dose_by_volume
      data:
        entity_id: switch.chlorine_pump
        volume: "{{ states('input_number.chlorine_dosing_amount') }}"
auto_dose_acid:
  sequence:
    - service: atlas_scientific.dose_by_volume
      data:
        entity_id: switch.acid_pump
        volume: "{{ states('input_number.auto_acid_dosing_amount') }}"
auto_dose_chlorine:
  sequence:
    - service: atlas_scientific.dose_by_volume
      data:
        entity_id: switch.chlorine_pump
        volume: "{{ states('input_number.auto_chlorine_dosing_amount') }}"
daily_dose_chlorine:
  sequence:
    - service: atlas_scientific.dose_by_volume
      data:
        entity_id: switch.chlorine_pump
        volume: "{{ states('input_number.daily_chlorine_dosing_amount') }}"
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.daily_chlorine_dosing_active
auto_daily_dose_chlorine:
  sequence:
    - service: atlas_scientific.dose_by_volume
      data:
        entity_id: switch.chlorine_pump
        volume: "{{ states('input_number.daily_chlorine_dosing_amount') }}"
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.daily_chlorine_dosing_active
