    badges: []
    title: Chemical
    icon: 'mdi:flask'
    cards:
      - title: Acid ( decrease pH )
        entities:
          - row:
            entity: input_number.acid_tank
            theme: default
            name: Tank Level (l)
          - entity: input_number.acid_concentration
            name: Concentration (%)
          - row:
            entity: input_number.acid_speed
            theme: default
            unit: ml/min
            name: Injection Speed (ml/min)
          - entity: switch.ph
            name: Acid Injection Pump
            secondary_info: last-changed
          - entity: input_boolean.lock_acid
            name: Disable Automatic Injection
        type: entities
        show_header_toggle: false
      - type: conditional
        conditions:
          - entity: input_boolean.salt_system
            state_not: "on"
        card:
          title: Sanitizer ( increase ORP )
          entities:
            - row:
              entity: input_number.chlorine_tank
              theme: default
              unit: l
              name: Tank Level (l)
            - entity: input_number.chlorine_concentration
              name: Concentration (%)
            - row:
              entity: input_number.chlorine_speed
              theme: default
              unit: ml/min
              name: Injection Speed (ml/min)
            - entity: switch.orp
              name: Chlorine Injection Pump
              secondary_info: last-changed
            - entity: input_boolean.lock_chlorine
              name: Disable Automatic Injection
          type: entities
          show_empty: false
          show_header_toggle: false
      - type: conditional
        conditions:
          - entity: input_boolean.salt_system
            state: "on"
        card:
          title: Salt System ( increase ORP )
          entities:
            - entity: input_number.chlorine_concentration
              name: Concentration (%)
            - entity: input_number.chlorine_speed
              name: Speed injection
          type: entities
          show_header_toggle: false